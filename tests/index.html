<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Carousel</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="carousel-container">
    <button id="prevBtn" class="carousel-arrow left">❮</button>
    <div id="carousel" class="carousel">
      <!-- Slides -->
      <div class="carousel-slide">
        <h2>Article 1</h2>
        <p>This is the content for Article 1. You can add any HTML here.</p>
      </div>
      <div class="carousel-slide">
        <h2>Article 2</h2>
        <p>This is the content for Article 2. Add text, images, or other elements.</p>
      </div>
      <div class="carousel-slide">
        <h2>Article 3</h2>
        <p>This is the content for Article 3. Customize it as needed.</p>
      </div>
    </div>
    <button id="nextBtn" class="carousel-arrow right">❯</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
